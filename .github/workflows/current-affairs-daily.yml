# Current Affairs Pipeline — daily scheduler
#
# Runs the existing collector (scripts/generate_current_affairs_v2.py)
# every morning and on demand. See docs/AUTOMATION_SCHEDULER.md for the
# architecture decision, required secrets, and operations guide.
#
# Layered guarantees:
#   concurrency group   -> no two workflow runs execute simultaneously
#   begin_automation_run-> DB-level guard: no two collector runs per source,
#                          even a local manual run vs. this scheduler
#   timeout-minutes     -> a hung job is killed; the DB stale-run sweep then
#                          closes its automation_runs row on the next run
#   retry loop          -> one automatic retry on failure; safe because the
#                          pipeline dedups by source_hash before drafting
#   failure step        -> opens/updates a GitHub issue (plus GitHub's own
#                          workflow-failure email)

name: Current Affairs Pipeline

on:
  schedule:
    # 01:00 UTC = 06:30 IST. GitHub cron may start a few minutes late
    # under load; acceptable for morning content.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of drafts to generate'
        required: false
        default: '5'
      dry_run:
        description: 'Dry run (no database writes)'
        type: boolean
        required: false
        default: false

# Never let two pipeline workflows overlap; queue instead of cancel so a
# manual run requested during the scheduled run still executes afterwards
# (where the DB dedup makes it a cheap no-op).
concurrency:
  group: current-affairs-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collector (one automatic retry)
        env:
          # Collector was migrated Groq -> OpenAI; it reads OPENAI_API_KEY.
          # OPENAI_MODEL is optional (collector defaults to gpt-4o-mini).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COUNT: ${{ github.event.inputs.count || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -o pipefail
          FLAGS="--count ${COUNT}"
          if [ "${DRY_RUN}" = "true" ]; then FLAGS="${FLAGS} --dry-run"; fi
          for attempt in 1 2; do
            echo "::group::Collector attempt ${attempt}"
            if python scripts/generate_current_affairs_v2.py ${FLAGS}; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" = "1" ]; then
              echo "Attempt 1 failed — retrying in 90s. Safe: items already"
              echo "drafted in the failed attempt are skipped by source_hash"
              echo "dedup, so a retry cannot create duplicates."
              sleep 90
            fi
          done
          exit 1

      - name: Notify on failure (GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="Automation failure: current-affairs pipeline"
          BODY="The current-affairs pipeline failed on $(date -u +'%Y-%m-%d %H:%M UTC') after retry.

          Workflow run: ${RUN_URL}

          Where to look:
          - Job log above for the collector traceback
          - Automation Health strip at /admin/drafts
          - automation_runs (success=false rows) and automation_dead_letter in Supabase"
          existing=$(gh issue list --repo "$REPO" --state open \
            --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$BODY"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
          fi
